openapi: 3.1.0
info:
  title: Retriva Chat Streaming API
  version: "0.8.0"
  description: >
    Extends the /v1/chat/completions endpoint with OpenAI-compatible SSE
    streaming via the delta protocol.

paths:
  /v1/chat/completions:
    post:
      summary: Chat completions with optional streaming
      operationId: createChatCompletion
      description: >
        When stream=false (default), returns a single JSON ChatCompletion.
        When stream=true, returns a text/event-stream of ChatCompletionChunk
        events following the OpenAI SSE delta protocol.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: Streaming or non-streaming response
          content:
            text/event-stream:
              schema:
                description: >
                  SSE stream of ChatCompletionChunk events.
                  Each line: "data: {json}\n\n"
                  Final line: "data: [DONE]\n\n"
                type: string
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
        "400":
          description: Bad request (no user message)

components:
  schemas:
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        messages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChatMessage"
        stream:
          type: boolean
          default: false
        temperature:
          type: number
          nullable: true
        top_p:
          type: number
          nullable: true

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string

    # --- Non-streaming response (unchanged from spec 004) ---

    ChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id:
          type: string
        object:
          type: string
          enum: ["chat.completion"]
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                $ref: "#/components/schemas/ChatMessage"
              finish_reason:
                type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer

    # --- Streaming response (new in spec 005) ---

    DeltaContent:
      type: object
      description: >
        Incremental content fragment. First event has only 'role',
        subsequent events have only 'content', final event is empty.
      properties:
        role:
          type: string
          enum: [assistant]
        content:
          type: string

    StreamingChoice:
      type: object
      properties:
        index:
          type: integer
        delta:
          $ref: "#/components/schemas/DeltaContent"
        finish_reason:
          type: string
          nullable: true
          description: "null during streaming, 'stop' on final chunk"

    ChatCompletionChunk:
      type: object
      required: [id, object, created, model, choices]
      description: >
        One SSE event in the stream. All chunks in a single response share
        the same 'id' value.
      properties:
        id:
          type: string
          example: "chatcmpl-abc123"
        object:
          type: string
          enum: ["chat.completion.chunk"]
        created:
          type: integer
        model:
          type: string
          example: "retriva"
        choices:
          type: array
          items:
            $ref: "#/components/schemas/StreamingChoice"
