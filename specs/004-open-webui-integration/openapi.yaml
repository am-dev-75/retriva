openapi: 3.1.0
info:
  title: Retriva OpenAI-Compatible API
  version: "0.7.0"
  description: >
    OpenAI-compatible chat completions and model listing for Open WebUI
    integration.  Retriva acts as a remote RAG backend — Open WebUI connects
    to it via base URL only, with no custom adapters or plugins.

paths:
  /v1/models:
    get:
      summary: List available models
      operationId: listModels
      description: >
        Returns a fixed model list containing the single "retriva" model.
        Required by Open WebUI for connection validation.
      responses:
        "200":
          description: List of models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListModelsResponse"

  /v1/chat/completions:
    post:
      summary: OpenAI-compatible chat completions with RAG
      operationId: createChatCompletion
      description: >
        Accepts an OpenAI-format chat request, extracts the user question,
        runs the full Retriva QA pipeline (retrieval → prompting → LLM →
        grounding validation), and returns an OpenAI-format response with
        citation metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
        "400":
          description: Bad request (empty messages, no user message)

components:
  schemas:
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          description: Model identifier (accepted but ignored — Retriva uses its configured backend)
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        stream:
          type: boolean
          default: false
          description: Accepted but ignored (streaming not yet supported)
        temperature:
          type: number
          nullable: true
        top_p:
          type: number
          nullable: true

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string
        metadata:
          $ref: "#/components/schemas/MessageMetadata"

    MessageMetadata:
      type: object
      properties:
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"

    Citation:
      type: object
      properties:
        document_id:
          type: string
          description: Source path or canonical document ID
        title:
          type: string
          description: Page title from chunk metadata
        source:
          type: string
          description: Source URL or path

    ChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id:
          type: string
          example: "chatcmpl-abc123"
        object:
          type: string
          enum: ["chat.completion"]
        created:
          type: integer
          description: Unix timestamp
        model:
          type: string
          example: "retriva"
        choices:
          type: array
          items:
            $ref: "#/components/schemas/ChatChoice"
        usage:
          $ref: "#/components/schemas/UsageInfo"

    ChatChoice:
      type: object
      properties:
        index:
          type: integer
        message:
          $ref: "#/components/schemas/ChatMessage"
        finish_reason:
          type: string
          enum: [stop]

    UsageInfo:
      type: object
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer

    ModelInfo:
      type: object
      required: [id, object, created, owned_by]
      properties:
        id:
          type: string
          example: "retriva"
        object:
          type: string
          enum: ["model"]
        created:
          type: integer
        owned_by:
          type: string
          example: "retriva"

    ListModelsResponse:
      type: object
      required: [object, data]
      properties:
        object:
          type: string
          enum: ["list"]
        data:
          type: array
          items:
            $ref: "#/components/schemas/ModelInfo"
